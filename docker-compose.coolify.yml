# Production stack for Coolify on Hostinger.
#
# In Coolify:
#   1. Create a new "Docker Compose" resource and paste this file's contents (or point to the repo).
#   2. Set the following environment variables in Coolify's UI (do NOT commit secrets):
#        POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#        SECRET_KEY, OPENAI_API_KEY
#        DOMAIN (e.g. learn.example.com), VITE_API_URL (e.g. https://api.learn.example.com)
#   3. In Coolify's domain settings, route ${DOMAIN} → frontend:80 and api.${DOMAIN} → backend:8000.
#      Coolify's Traefik takes care of HTTPS via Let's Encrypt — do not expose ports here.

name: learning-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      DEMO_USERNAME: ${DEMO_USERNAME:-demo}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-learnnow}
      BACKEND_CORS_ORIGINS: "https://${DOMAIN}"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "8080"
    networks:
      - default
      - coolify
    # Explicit Traefik labels — Coolify escapes $ in compose label values, so
    # env-var interpolation ($VAR / ${VAR}) can't be used here. Values are
    # hard-coded to this deployment's domain.
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.services.lp-frontend.loadbalancer.server.port=8080
      - "traefik.http.routers.lp-frontend-http.rule=Host(`agent2agent.company`)"
      - traefik.http.routers.lp-frontend-http.entrypoints=http
      - traefik.http.routers.lp-frontend-http.middlewares=lp-redir-https
      - traefik.http.middlewares.lp-redir-https.redirectscheme.scheme=https
      - traefik.http.middlewares.lp-redir-https.redirectscheme.permanent=true
      - "traefik.http.routers.lp-frontend-https.rule=Host(`agent2agent.company`)"
      - traefik.http.routers.lp-frontend-https.entrypoints=https
      - traefik.http.routers.lp-frontend-https.tls=true
      - traefik.http.routers.lp-frontend-https.tls.certresolver=letsencrypt

networks:
  coolify:
    external: true

volumes:
  postgres_data:
