# Single-service production stack for Coolify. FastAPI serves both /api/*
# and the React SPA from the same container, so there's only one Traefik
# router to configure (apex → app, port 8000).
#
# Coolify env vars required:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   SECRET_KEY, OPENAI_API_KEY
#   DOMAIN (e.g. agent2agent.company)

name: learning-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Empty string → SPA makes same-origin /api/* calls to this container.
        VITE_API_URL: ""
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      DEMO_USERNAME: ${DEMO_USERNAME:-demo}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-learnnow}
      BACKEND_CORS_ORIGINS: "https://${DOMAIN}"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

volumes:
  postgres_data:
